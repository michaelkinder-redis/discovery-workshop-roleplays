;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"92c509f4-ab3e-4692-add4-55a529182aad\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* TT Trailers — licensed display face (self-hosted in assets/fonts/).\n   SINGLE source of truth for this @font-face — lists both filename\n   conventions present in the project so deck + components share one face. */\n@font-face {\n  font-family: \"TT Trailers\";\n  src: url(\"a5003869-1034-488d-a01f-a596367ccc52\") format(\"woff2\"),\n       url(\"e09609ba-afc9-4a42-ae11-55a11c627d0b\") format(\"woff2\"),\n       url(\"8575ffb9-7a28-4246-ad6e-d5efb85daa80\") format(\"woff\"),\n       url(\"e6541e6d-448c-40e8-886b-c553a3eebf7a\") format(\"opentype\"),\n       url(\"a51afe3e-ffcf-4d5c-9483-1b08c7ae80cf\") format(\"truetype\");\n  font-weight: 700;\n  font-style: normal;\n  font-display: swap;\n}\n\n/* =========================================================\n   Redis Design Tokens\n   Source of truth — all colors, type, spacing, motion.\n   Mirror these in any Figma / JS / Tailwind config.\n   ========================================================= */\n\n:root {\n  /* ---------- Brand colors (Hyper — signature) ---------- */\n  --rd-hyper-01: #FFF3F2;\n  --rd-hyper-02: #FFDAD8;\n  --rd-hyper-03: #FFACA7;\n  --rd-hyper-04: #FD736A;\n  --rd-hyper-05: #FF4438;   /* BASE — primary brand */\n  --rd-hyper-06: #EB352A;\n  --rd-hyper-07: #E4291E;\n  --rd-hyper-08: #D1281E;   /* Rich */\n  --rd-hyper-09: #8A221C;\n  --rd-hyper-10: #351D22;\n\n  /* ---------- Midnight (deepest dark) ---------- */\n  --rd-midnight-base: #091A23;  /* primary dark surface */\n  --rd-midnight-02:   #07151C;\n\n  /* ---------- Dusk (cool gray-blue, neutrals) ---------- */\n  --rd-dusk-01: #F3F3F3;\n  --rd-dusk-02: #E9E9E9;\n  --rd-dusk-03: #D9D9D9;\n  --rd-dusk-04: #B9C2C6;\n  --rd-dusk-05: #8A99A0;\n  --rd-dusk-06: #5C707A;   /* Lightest */\n  --rd-dusk-07: #2D4754;   /* Light */\n  --rd-dusk-08: #163341;   /* BASE */\n  --rd-dusk-09: #0D212C;\n\n  /* ---------- Yellow (lime accent) ---------- */\n  --rd-yellow-01: #FEFFF5;\n  --rd-yellow-02: #F5FFC6;\n  --rd-yellow-03: #F1FFA8;\n  --rd-yellow-04: #E9FF72;\n  --rd-yellow-05: #DCFF1E;   /* BASE */\n  --rd-yellow-06: #D0F41D;   /* Deep */\n  --rd-yellow-07: #BFE112;\n  --rd-yellow-08: #A9CA03;\n  --rd-yellow-09: #8CAA00;\n\n  /* ---------- Purple (highlighter accent) ---------- */\n  --rd-purple-01: #F9F4FC;\n  --rd-purple-02: #F1E5FA;\n  --rd-purple-03: #E3CAF1;   /* Light */\n  --rd-purple-04: #C795E3;   /* BASE */\n  --rd-purple-05: #B76BE2;   /* Deep */\n  --rd-purple-06: #9C42CE;\n  --rd-purple-07: #8F2EC4;\n  --rd-purple-08: #7C1AB3;\n  --rd-purple-09: #592479;\n\n  /* ---------- Sky blue (highlighter accent) ---------- */\n  --rd-blue-01: #F2FBFF;\n  --rd-blue-02: #BFEDFF;   /* Light */\n  --rd-blue-03: #80DBFF;   /* BASE */\n  --rd-blue-04: #5ED1FF;   /* Deep */\n  --rd-blue-05: #33C2FB;\n  --rd-blue-06: #25B5EE;\n  --rd-blue-07: #0F9FD9;\n  --rd-blue-08: #0E8EC0;\n  --rd-blue-09: #0477A5;\n\n  /* ---------- Neutral grays (functional, not brand) ---------- */\n  --rd-gray-01: #FCFCFC;\n  --rd-gray-02: #F8F8F8;\n  --rd-gray-03: #E6E6E6;\n  --rd-gray-04: #D1D3D4;\n  --rd-gray-05: #BCBEC0;\n  --rd-gray-06: #A7A9AC;\n  --rd-gray-07: #939598;\n  --rd-gray-08: #6D6E71;\n  --rd-gray-09: #58595B;\n  --rd-gray-10: #414042;\n\n  --rd-white: #FFFFFF;\n  --rd-black: #000000;\n  --rd-black-02: #282828;\n  --rd-black-03: #2C2C2C;\n\n  /* ---------- Type families ----------\n     TT Trailers is a licensed commercial typeface for display ONLY\n     (covers, section dividers, big stats). It has NO Anton fallback —\n     reserve it for true display moments and use Space Grotesk\n     (Medium 500 max — never Bold/SemiBold) for headlines everywhere else. */\n  --rd-font-display: \"TT Trailers\", \"Space Grotesk\", \"Helvetica Neue\", Arial, sans-serif;\n  --rd-font-sans:    \"Space Grotesk\", \"Helvetica Neue\", Arial, sans-serif;\n  --rd-font-mono:    \"Space Mono\", ui-monospace, \"SF Mono\", Menlo, monospace;\n\n  /* ---------- Type scale (px) ---------- */\n  --rd-text-xs:   12px;\n  --rd-text-sm:   14px;\n  --rd-text-base: 16px;\n  --rd-text-md:   18px;\n  --rd-text-lg:   20px;\n  --rd-text-xl:   24px;\n  --rd-text-2xl:  30px;\n  --rd-text-3xl:  40px;\n  --rd-text-4xl:  58px;\n  --rd-text-5xl:  80px;\n  --rd-text-display: 120px;\n\n  /* ---------- Spacing (4-pt grid) ---------- */\n  --rd-space-1:  4px;\n  --rd-space-2:  8px;\n  --rd-space-3:  12px;\n  --rd-space-4:  16px;\n  --rd-space-5:  20px;\n  --rd-space-6:  24px;\n  --rd-space-8:  32px;\n  --rd-space-10: 40px;\n  --rd-space-12: 48px;\n  --rd-space-16: 64px;\n  --rd-space-20: 80px;\n  --rd-space-24: 96px;\n  --rd-space-32: 128px;\n\n  /* ---------- Radii ---------- */\n  --rd-radius-xs: 2px;\n  --rd-radius-sm: 4px;\n  --rd-radius-md: 5px;\n  --rd-radius-lg: 8px;\n  --rd-radius-xl: 12px;\n  --rd-radius-pill: 999px;\n\n  /* ---------- Motion ---------- */\n  --rd-ease-out:  cubic-bezier(0.16, 1, 0.3, 1); /* @kind other */\n  --rd-ease-in-out: cubic-bezier(0.65, 0, 0.35, 1); /* @kind other */\n  --rd-dur-fast:  120ms; /* @kind other */\n  --rd-dur-base:  200ms; /* @kind other */\n  --rd-dur-slow:  360ms; /* @kind other */\n\n  /* ---------- Layout ---------- */\n  --rd-container: 1280px;\n  --rd-sidebar-w: 260px;\n  --rd-topbar-h: 56px;\n}\n\n/* =========================================================\n   Semantic tokens — theme-aware\n   Light theme by default; .theme-dark overrides on body.\n   ========================================================= */\n:root {\n  /* surfaces */\n  --bg:        var(--rd-white);\n  --bg-elev:   var(--rd-gray-02);\n  --bg-sunken: var(--rd-dusk-01);\n  --surface-inverse: var(--rd-midnight-base);\n\n  /* text */\n  --fg:         var(--rd-midnight-base);\n  --fg-muted:   var(--rd-dusk-07);\n  --fg-subtle:  var(--rd-dusk-06);\n  --fg-inverse: var(--rd-white);\n\n  /* lines */\n  --border:        var(--rd-dusk-03);\n  --border-strong: var(--rd-dusk-05);\n\n  /* brand action */\n  --action:        var(--rd-hyper-05);\n  --action-hover:  var(--rd-hyper-06);\n  --action-press:  var(--rd-hyper-07);\n  --action-fg:     var(--rd-white);\n\n  /* accent */\n  --accent-yellow: var(--rd-yellow-05);\n  --accent-purple: var(--rd-purple-04);\n  --accent-blue:   var(--rd-blue-03);\n\n  /* state */\n  --focus-ring: var(--rd-hyper-05);\n\n  color-scheme: light;\n}\n\n.theme-dark {\n  --bg:        var(--rd-midnight-base);\n  --bg-elev:   var(--rd-dusk-09);\n  --bg-sunken: var(--rd-midnight-02);\n  --surface-inverse: var(--rd-white);\n\n  --fg:         var(--rd-white);\n  --fg-muted:   var(--rd-dusk-04);\n  --fg-subtle:  var(--rd-dusk-05);\n  --fg-inverse: var(--rd-midnight-base);\n\n  --border:        var(--rd-dusk-07);\n  --border-strong: var(--rd-dusk-06);\n\n  --action:        var(--rd-hyper-05);\n  --action-hover:  var(--rd-hyper-04);\n  --action-press:  var(--rd-hyper-06);\n  --action-fg:     var(--rd-white);\n\n  color-scheme: dark;\n}\n\n/* ============================================================\n   LEGACY ALIASES — bridge layer\n   Maps the variable/class names used by earlier-built artifacts\n   (deck.css, UI kits, some preview cards) onto the REAL token\n   system in tokens.css. The real tokens + components.css are the\n   source of truth; this only keeps older references resolving.\n   New work should use the real tokens (--bg, --fg, --action…)\n   and real component classes directly.\n   ============================================================ */\n:root {\n  /* semantic color aliases → real semantic tokens (theme-aware via var()) */\n  --rd-bg: var(--bg);\n  --rd-bg-subtle: var(--bg-sunken);\n  --rd-surface: var(--bg);\n  --rd-surface-sunken: var(--bg-sunken);\n  --rd-line: var(--border);\n  --rd-line-strong: var(--border-strong);\n  --rd-fg: var(--fg);\n  --rd-fg-muted: var(--fg-muted);\n  --rd-fg-subtle: var(--fg-subtle);\n  --rd-fg-on-dark: var(--rd-white);\n  --rd-fg-on-hyper: var(--action-fg);\n  --rd-action: var(--action);\n  --rd-action-hover: var(--action-hover);\n  --rd-action-press: var(--action-press);\n  --rd-focus: var(--focus-ring);\n  --rd-accent: var(--accent-yellow);\n\n  /* type aliases → real type scale */\n  --rd-text-h1: var(--rd-text-4xl);\n  --rd-text-h2: var(--rd-text-3xl);\n  --rd-text-h3: var(--rd-text-2xl);\n  --rd-text-h4: var(--rd-text-xl);\n  --rd-text-lead: var(--rd-text-lg);\n  --rd-text-body: var(--rd-text-base);\n  --rd-text-small: var(--rd-text-sm);\n  --rd-text-eyebrow: var(--rd-text-xs);\n  --rd-leading-tight: 1.02;\n  --rd-leading-snug: 1.15;\n  --rd-leading-normal: 1.5;\n  --rd-track-display: -0.02em;\n  --rd-track-eyebrow: 0.12em;\n  --rd-weight-regular: 400;\n  --rd-weight-medium: 500;\n  /* No bold/semibold for Space Grotesk — Medium (500) is the heaviest weight in the system. */\n\n  /* spacing steps not present in the real scale */\n  --rd-space-0: 0;\n  --rd-space-7: 48px;\n  --rd-space-9: 96px;\n\n  /* easing alias (real file only ships ease-out / ease-in-out) */\n  --rd-ease-standard: var(--rd-ease-out);\n\n  /* the real system uses borders, not shadows, on cards;\n     these remain only for legacy artifacts that referenced them */\n  --rd-shadow-sm: 0 1px 2px rgba(9,26,35,0.06);\n  --rd-shadow-md: 0 4px 12px rgba(9,26,35,0.08);\n  --rd-shadow-lg: 0 24px 48px rgba(9,26,35,0.18);\n  --rd-shadow-hyper: 0 8px 24px rgba(255,68,56,0.28);\n\n  /* deck safe edge */\n  --rd-deck-safe: 120px;\n}\n\n/* ---- legacy element helper classes ---- */\n.rd-root, body.rd-root {\n  background: var(--bg);\n  color: var(--fg);\n  font-family: var(--rd-font-sans);\n  font-size: var(--rd-text-base);\n  line-height: 1.5;\n  -webkit-font-smoothing: antialiased;\n}\n.rd-eyebrow {\n  font-family: var(--rd-font-mono);\n  font-size: var(--rd-text-xs);\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--fg-subtle);\n}\n\n/* legacy button size + variants → real equivalents */\n.rd-btn--small { font-size: 12px; padding: 10px 20px; }\n.rd-btn--icon { padding: 12px; }\n\n/* legacy card hover */\n.rd-card--interactive { cursor: pointer; }\n.rd-card--interactive:hover { border-color: var(--fg); }\n\n/* legacy tag accent → yellow */\n.rd-tag--accent { background: var(--rd-yellow-05); color: var(--rd-midnight-base); border-color: transparent; }\n\n/* legacy CTA bar → real CTA */\n.rd-cta-bar {\n  display: flex; align-items: center; justify-content: space-between;\n  gap: var(--rd-space-8);\n  background: var(--rd-midnight-base); color: var(--rd-white);\n  border-radius: var(--rd-radius-xl); padding: var(--rd-space-12);\n}\n\n/* legacy toast accent */\n.rd-toast--hyper { border-left-color: var(--rd-hyper-05); }\n\n/* legacy form label */\n.rd-label {\n  font-family: var(--rd-font-mono);\n  font-size: var(--rd-text-xs);\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--fg-muted);\n}\n\n/* legacy code block → mirrors real .rd-code visual */\n.rd-code-block {\n  display: block;\n  font-family: var(--rd-font-mono);\n  background: var(--rd-midnight-base);\n  color: var(--rd-white);\n  border-radius: var(--rd-radius-md);\n  padding: var(--rd-space-5) var(--rd-space-6);\n  font-size: 14px; line-height: 1.6;\n  overflow: auto;\n}\n.rd-code-block .tok-key, .rd-code-block .tok-kw  { color: var(--rd-purple-04); }\n.rd-code-block .tok-str { color: var(--rd-yellow-05); }\n.rd-code-block .tok-num { color: var(--rd-blue-03); }\n.rd-code-block .tok-fn  { color: var(--rd-hyper-04); }\n.rd-code-block .tok-com { color: var(--rd-dusk-05); font-style: italic; }\n\n/* =========================================================\n   Redis Component Library\n   Token-driven. Class prefix `rd-`. Mirror in any framework.\n   ========================================================= */\n\n/* ---------- Buttons ---------- */\n/*\n  Geometry: rounded rectangle, NOT pill. Matches UI Toolkit.\n  Variants: primary (Hyper) · secondary (outlined) · tertiary (red text + arrow)\n  + back, load-more, share are all tertiary variants with different glyphs.\n*/\n.rd-btn {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  gap: 8px;\n  font-family: var(--rd-font-sans);\n  font-weight: 400;\n  font-size: 14px;\n  line-height: 1;\n  padding: 14px 28px;\n  border-radius: var(--rd-radius-md);\n  border: 1px solid transparent;\n  cursor: pointer;\n  user-select: none;\n  text-decoration: none;\n  white-space: nowrap;\n  flex-shrink: 0;\n  transition: background var(--rd-dur-fast) var(--rd-ease-out),\n              color var(--rd-dur-fast) var(--rd-ease-out),\n              border-color var(--rd-dur-fast) var(--rd-ease-out),\n              transform var(--rd-dur-fast) var(--rd-ease-out);\n}\n.rd-btn:focus-visible {\n  outline: 2px solid var(--focus-ring);\n  outline-offset: 2px;\n}\n.rd-btn:active { transform: translateY(1px); }\n\n/* sizes */\n.rd-btn--sm { font-size: 12px; padding: 10px 20px; }\n.rd-btn--lg { font-size: 16px; padding: 18px 32px; }\n\n/* primary — Hyper red on light; outlined red on dark */\n.rd-btn--primary {\n  background: var(--rd-hyper-05);\n  color: var(--rd-white);\n  border-color: var(--rd-hyper-05);\n}\n.rd-btn--primary:hover  { background: var(--rd-hyper-08); border-color: var(--rd-hyper-08); }\n.rd-btn--primary:active { background: var(--rd-hyper-09); border-color: var(--rd-hyper-09); }\n\n.theme-dark .rd-btn--primary {\n  background: var(--rd-hyper-10);\n  color: var(--rd-white);\n  border-color: var(--rd-hyper-05);\n}\n.theme-dark .rd-btn--primary:hover  { background: var(--rd-hyper-09); border-color: var(--rd-hyper-06); }\n.theme-dark .rd-btn--primary:active { background: var(--rd-hyper-06); border-color: var(--rd-hyper-06); }\n\n/* secondary — white on light w/ hairline border; elevated dark on dark */\n.rd-btn--secondary {\n  background: var(--rd-white);\n  color: var(--rd-midnight-base);\n  border-color: var(--rd-dusk-04);\n}\n.rd-btn--secondary:hover  { background: var(--rd-dusk-02); border-color: var(--rd-dusk-05); }\n.rd-btn--secondary:active { background: var(--rd-dusk-03); }\n\n.theme-dark .rd-btn--secondary {\n  background: var(--rd-dusk-08);\n  color: var(--rd-white);\n  border-color: var(--rd-dusk-07);\n}\n.theme-dark .rd-btn--secondary:hover  { background: var(--rd-dusk-07); border-color: var(--rd-dusk-06); }\n.theme-dark .rd-btn--secondary:active { background: var(--rd-dusk-06); }\n\n/* tertiary — Hyper red text + arrow, no surface, no underline */\n.rd-btn--tertiary {\n  background: transparent;\n  color: var(--rd-hyper-05);\n  padding: 8px 4px;\n  border-radius: 0;\n  border: 0;\n  font-size: 14px;\n  font-weight: 400;\n  gap: 8px;\n  text-decoration: none;\n}\n.rd-btn--tertiary:hover  { color: var(--rd-hyper-06); }\n.rd-btn--tertiary:active { color: var(--rd-hyper-08); }\n.theme-dark .rd-btn--tertiary:hover  { color: var(--rd-hyper-04); }\n\n/* back / load-more / share — tertiary glyph variants */\n.rd-btn--back, .rd-btn--load, .rd-btn--share {\n  background: transparent;\n  color: var(--rd-hyper-05);\n  padding: 8px 4px;\n  border-radius: 0;\n  border: 0;\n  font-weight: 400;\n  gap: 8px;\n  text-decoration: none;\n}\n.rd-btn--back:hover,\n.rd-btn--load:hover,\n.rd-btn--share:hover { color: var(--rd-hyper-06); }\n\n/* disabled — same in both modes, gray with muted text */\n.rd-btn[disabled], .rd-btn--disabled {\n  background: var(--rd-dusk-03);\n  color: var(--rd-dusk-06);\n  border-color: var(--rd-dusk-03);\n  pointer-events: none;\n  cursor: not-allowed;\n}\n.theme-dark .rd-btn--disabled,\n.theme-dark .rd-btn[disabled] {\n  background: var(--rd-dusk-07);\n  color: var(--rd-dusk-05);\n  border-color: var(--rd-dusk-07);\n}\n\n/* on-dark contexts (preview, CTA bar, navbar) — same as theme-dark variant overrides\n   so a button on a dark surface always renders its dark form, regardless of the page theme. */\n.preview__body.dark .rd-btn--primary,\n.rd-cta .rd-btn--primary,\n.rd-navbar .rd-btn--primary,\n.on-dark .rd-btn--primary {\n  background: var(--rd-hyper-10);\n  color: var(--rd-white);\n  border-color: var(--rd-hyper-05);\n}\n.preview__body.dark .rd-btn--primary:hover,\n.rd-cta .rd-btn--primary:hover,\n.rd-navbar .rd-btn--primary:hover,\n.on-dark .rd-btn--primary:hover {\n  background: var(--rd-hyper-09);\n  border-color: var(--rd-hyper-06);\n}\n.preview__body.dark .rd-btn--secondary,\n.rd-cta .rd-btn--secondary,\n.rd-navbar .rd-btn--secondary,\n.on-dark .rd-btn--secondary {\n  background: var(--rd-dusk-08);\n  color: var(--rd-white);\n  border-color: var(--rd-dusk-07);\n}\n.preview__body.dark .rd-btn--secondary:hover,\n.rd-cta .rd-btn--secondary:hover,\n.rd-navbar .rd-btn--secondary:hover,\n.on-dark .rd-btn--secondary:hover {\n  background: var(--rd-dusk-07);\n  border-color: var(--rd-dusk-06);\n}\n\n/* arrow glyph — chunky Redis arrow asset.\n   Inherits color via currentColor. Use modifier classes to rotate. */\n.rd-btn .arrow {\n  display: inline-flex;\n  align-items: center;\n  width: 0.95em;\n  height: 0.85em;\n  transition: transform var(--rd-dur-fast) var(--rd-ease-out);\n}\n.rd-btn .arrow svg {\n  width: 100%;\n  height: 100%;\n  display: block;\n  fill: currentColor;\n}\n.rd-btn .arrow.left  svg { transform: rotate(180deg); }\n.rd-btn .arrow.up    svg { transform: rotate(-90deg); }\n.rd-btn .arrow.down  svg { transform: rotate(90deg); }\n\n.rd-btn--tertiary:hover .arrow,\n.rd-btn--load:hover    .arrow.down,\n.rd-btn--share:hover   .arrow.up   { transform: translateX(2px); }\n.rd-btn--load:hover    .arrow.down { transform: translateY(2px); }\n.rd-btn--share:hover   .arrow.up   { transform: translateY(-2px); }\n.rd-btn--back:hover    .arrow.left { transform: translateX(-2px); }\n\n/* ---------- UI glyphs (custom Redis set — use instead of text/unicode) ----------\n   Mask-based so they inherit currentColor. Sizes match the source artwork.\n   <i class=\"rd-ico rd-ico--arrow\"><\u002Fi>  — color follows text color.\n   Add rd-ico--lg for 20px, or set font-size/width-height inline. */\n.rd-ico {\n  display: inline-block;\n  flex: none;\n  width: 1em;\n  height: 1em;\n  background: currentColor;\n  -webkit-mask: center / contain no-repeat;\n  mask: center / contain no-repeat;\n  vertical-align: -0.125em;\n}\n.rd-ico--arrow    { -webkit-mask-image: url(\"../assets/icons/ui/arrow.svg\");    mask-image: url(\"../assets/icons/ui/arrow.svg\"); }\n.rd-ico--caret    { -webkit-mask-image: url(\"../assets/icons/ui/caret.svg\");    mask-image: url(\"../assets/icons/ui/caret.svg\"); }\n.rd-ico--check    { -webkit-mask-image: url(\"../assets/icons/ui/check.svg\");    mask-image: url(\"../assets/icons/ui/check.svg\"); }\n.rd-ico--download { -webkit-mask-image: url(\"../assets/icons/ui/download.svg\"); mask-image: url(\"../assets/icons/ui/download.svg\"); }\n.rd-ico--share    { -webkit-mask-image: url(\"../assets/icons/ui/share.svg\");    mask-image: url(\"../assets/icons/ui/share.svg\"); }\n.rd-ico--x        { -webkit-mask-image: url(\"../assets/icons/ui/x.svg\");        mask-image: url(\"../assets/icons/ui/x.svg\"); }\n/* rotations for the arrow/caret */\n.rd-ico--up    { transform: rotate(-90deg); }\n.rd-ico--down  { transform: rotate(90deg); }\n.rd-ico--left  { transform: rotate(180deg); }\n\n/* ---------- Tags ---------- */\n.rd-tag {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  font-family: var(--rd-font-mono);\n  font-size: 12px;\n  line-height: 1;\n  padding: 6px 10px;\n  border-radius: var(--rd-radius-xs);\n  background: var(--bg-elev);\n  color: var(--fg);\n  border: 1px solid var(--border);\n}\n.rd-tag--hyper  { background: var(--rd-hyper-05);  color: var(--rd-white); border-color: transparent; }\n.rd-tag--yellow { background: var(--rd-yellow-05); color: var(--rd-midnight-base); border-color: transparent; }\n.rd-tag--purple { background: var(--rd-purple-03); color: var(--rd-midnight-base); border-color: transparent; }\n.rd-tag--blue   { background: var(--rd-blue-03);   color: var(--rd-midnight-base); border-color: transparent; }\n\n/* ---------- Chips (filter) ---------- */\n.rd-chip {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  font-family: var(--rd-font-sans);\n  font-size: 14px;\n  padding: 8px 14px;\n  border-radius: var(--rd-radius-md);\n  background: var(--bg);\n  color: var(--fg);\n  border: 1px solid var(--border);\n  cursor: pointer;\n  transition: background var(--rd-dur-fast), border-color var(--rd-dur-fast);\n}\n.rd-chip:hover { border-color: var(--fg); }\n.rd-chip[aria-pressed=\"true\"] {\n  background: var(--rd-midnight-base);\n  color: var(--rd-white);\n  border-color: var(--rd-midnight-base);\n}\n.theme-dark .rd-chip[aria-pressed=\"true\"] {\n  background: var(--rd-white);\n  color: var(--rd-midnight-base);\n  border-color: var(--rd-white);\n}\n\n/* ---------- Form fields ---------- */\n.rd-field {\n  display: flex;\n  flex-direction: column;\n  gap: 6px;\n  font-family: var(--rd-font-sans);\n}\n.rd-field__label {\n  font-size: 14px;\n  font-weight: 500;\n  color: var(--fg);\n}\n.rd-field__help {\n  font-size: 12px;\n  color: var(--fg-subtle);\n}\n.rd-field__error {\n  font-size: 12px;\n  color: var(--rd-hyper-05);\n  font-weight: 500;\n}\n.rd-input,\n.rd-select,\n.rd-textarea {\n  font-family: inherit;\n  font-size: 16px;\n  padding: 12px 14px;\n  background: var(--bg);\n  border: 1px solid var(--border);\n  border-radius: var(--rd-radius-md);\n  color: var(--fg);\n  transition: border-color var(--rd-dur-fast), background var(--rd-dur-fast);\n}\n.rd-input::placeholder,\n.rd-textarea::placeholder { color: var(--fg-subtle); }\n.rd-input:hover,\n.rd-select:hover,\n.rd-textarea:hover { border-color: var(--border-strong); }\n.rd-input:focus,\n.rd-select:focus,\n.rd-textarea:focus {\n  outline: none;\n  border-color: var(--rd-midnight-base);\n  box-shadow: 0 0 0 3px var(--rd-blue-02);\n}\n.theme-dark .rd-input:focus,\n.theme-dark .rd-select:focus,\n.theme-dark .rd-textarea:focus {\n  border-color: var(--rd-white);\n  box-shadow: 0 0 0 3px var(--rd-dusk-07);\n}\n.rd-input[aria-invalid=\"true\"] {\n  border-color: var(--rd-hyper-05);\n}\n.rd-input[disabled] {\n  background: var(--bg-elev);\n  color: var(--fg-subtle);\n  cursor: not-allowed;\n}\n\n.rd-select {\n  appearance: none;\n  background-image:\n    linear-gradient(45deg, transparent 50%, var(--fg) 50%),\n    linear-gradient(135deg, var(--fg) 50%, transparent 50%);\n  background-position:\n    calc(100% - 18px) 50%,\n    calc(100% - 13px) 50%;\n  background-size: 5px 5px;\n  background-repeat: no-repeat;\n  padding-right: 36px;\n}\n\n/* checkbox */\n.rd-check {\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n  font-size: 14px;\n  cursor: pointer;\n}\n.rd-check input {\n  appearance: none;\n  width: 18px; height: 18px;\n  border: 1px solid var(--border-strong);\n  border-radius: var(--rd-radius-xs);\n  background: var(--bg);\n  display: grid;\n  place-content: center;\n  cursor: pointer;\n  transition: background var(--rd-dur-fast), border-color var(--rd-dur-fast);\n}\n.rd-check input::before {\n  content: \"\";\n  width: 12px; height: 12px;\n  transform: scale(0);\n  background: var(--rd-midnight-base);\n  -webkit-mask: url(\"../assets/icons/ui/check.svg\") center / contain no-repeat;\n  mask: url(\"../assets/icons/ui/check.svg\") center / contain no-repeat;\n  transition: transform var(--rd-dur-fast);\n}\n.rd-check input:checked {\n  background: var(--rd-yellow-05);\n  border-color: var(--rd-yellow-05);\n}\n.rd-check input:checked::before { transform: scale(1); }\n\n/* input with a trailing action (password show/hide, etc.) */\n.rd-input-wrap {\n  display: flex; align-items: stretch;\n  border: 1px solid var(--border-strong);\n  border-radius: var(--rd-radius-sm);\n  background: var(--bg);\n  overflow: hidden;\n  transition: border-color var(--rd-dur-fast);\n}\n.rd-input-wrap:focus-within { border-color: var(--rd-focus, var(--rd-white)); }\n.rd-input-wrap .rd-input { border: 0; border-radius: 0; background: transparent; flex: 1; }\n.rd-input-wrap__btn {\n  border: 0; border-left: 1px solid var(--border-strong);\n  background: transparent; padding: 0 14px; cursor: pointer;\n  display: grid; place-content: center;\n}\n.rd-input-wrap__btn img { width: 18px; height: 18px; opacity: 0.7; }\n.rd-input-wrap--error { border-color: var(--rd-hyper-05); }\n\n/* password-requirements popover */\n.rd-pwhint {\n  position: relative;\n  background: var(--rd-midnight-02);\n  border: 1px solid var(--border);\n  border-radius: var(--rd-radius-md);\n  padding: var(--rd-space-5) var(--rd-space-6);\n  max-width: 340px;\n}\n.rd-pwhint h4 { margin: 0 0 var(--rd-space-3); font-size: 16px; font-weight: 500; color: var(--fg); }\n.rd-pwhint ul { margin: 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 10px; }\n.rd-pwhint li { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--fg); }\n.rd-pwhint__dot {\n  width: 18px; height: 18px; border-radius: 999px; flex: none;\n  display: grid; place-content: center;\n  background: var(--rd-dusk-06);\n}\n.rd-pwhint__dot::after {\n  content: \"\"; width: 9px; height: 9px; background: var(--rd-white);\n  clip-path: polygon(14% 44%, 0% 60%, 36% 100%, 100% 16%, 84% 0%, 36% 68%);\n}\n.rd-pwhint li.met .rd-pwhint__dot { background: var(--rd-yellow-05); }\n.rd-pwhint li.met .rd-pwhint__dot::after { background: var(--rd-midnight-base); }\n\n/* ---------- Cards ---------- */\n.rd-card {\n  display: flex;\n  flex-direction: column;\n  gap: var(--rd-space-3);\n  padding: var(--rd-space-6);\n  background: var(--bg);\n  border: 1px solid var(--border);\n  border-radius: var(--rd-radius-lg);\n  transition: border-color var(--rd-dur-fast), transform var(--rd-dur-base) var(--rd-ease-out);\n}\n.rd-card--hover { cursor: pointer; }\n.rd-card--hover:hover {\n  border-color: var(--rd-dusk-07);\n}\n.rd-card--hover:active,\n.rd-card--hover.is-active {\n  border-color: var(--rd-yellow-05);\n}\n.rd-card__eyebrow {\n  font-family: var(--rd-font-mono);\n  font-size: 12px;\n  letter-spacing: 0.06em;\n  text-transform: uppercase;\n  color: var(--fg-subtle);\n}\n.rd-card__title {\n  font-family: var(--rd-font-sans);\n  font-weight: 500;\n  font-size: 22px;\n  line-height: 1.2;\n  margin: 0;\n  letter-spacing: -0.005em;\n}\n.rd-card__body {\n  color: var(--fg-muted);\n  font-size: 15px;\n  line-height: 1.55;\n  margin: 0;\n}\n.rd-card__cta {\n  margin-top: auto;\n  padding-top: var(--rd-space-3);\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  font-weight: 500;\n  font-size: 15px;\n  color: var(--rd-hyper-05);\n}\n.rd-card__cta::after {\n  content: \"\";\n  width: 1.15em;\n  height: 1.15em;\n  background: currentColor;\n  -webkit-mask: url(\"../assets/icons/arrow.svg\") center / contain no-repeat;\n  mask: url(\"../assets/icons/arrow.svg\") center / contain no-repeat;\n  transition: transform var(--rd-dur-fast) var(--rd-ease-out);\n}\n.rd-card--hover:hover .rd-card__cta::after { transform: translateX(3px); }\n.rd-card--feature {\n  background: var(--rd-midnight-base);\n  color: var(--rd-white);\n  border-color: var(--rd-midnight-base);\n}\n.rd-card--feature .rd-card__body { color: var(--rd-dusk-04); }\n.rd-card--accent {\n  background: var(--rd-yellow-05);\n  border-color: var(--rd-yellow-05);\n  color: var(--rd-midnight-base);\n}\n.rd-card--accent .rd-card__body { color: var(--rd-midnight-base); }\n\n/* ---------- Customer story card (image + tag overlay + logo + link) ---------- */\n.rd-story {\n  display: flex;\n  flex-direction: column;\n  background: var(--bg);\n  border: 1px solid var(--border);\n  border-radius: var(--rd-radius-lg);\n  overflow: hidden;\n  transition: border-color var(--rd-dur-fast);\n  cursor: pointer;\n}\n.rd-story:hover { border-color: var(--rd-dusk-06); }\n.rd-story:active, .rd-story.is-active { border-color: var(--rd-yellow-05); background: var(--rd-dusk-09); }\n.rd-story__media { position: relative; aspect-ratio: 16 / 10; background: var(--rd-dusk-08); overflow: hidden; }\n.rd-story__media img { width: 100%; height: 100%; object-fit: cover; display: block; }\n.rd-story__tag {\n  position: absolute; left: var(--rd-space-6); bottom: 0;\n  font-family: var(--rd-font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;\n  color: var(--rd-white); background: rgba(9, 26, 35, 0.72);\n  padding: 8px 14px;\n  border-radius: 5px 5px 0 0;\n}\n.rd-story__body { padding: var(--rd-space-6); display: flex; flex-direction: column; gap: var(--rd-space-3); flex: 1; }\n.rd-story__logo { font-family: var(--rd-font-sans); font-weight: 500; font-size: 28px; letter-spacing: -1px; color: var(--rd-white); }\n.rd-story__text { color: var(--rd-dusk-02); font-size: 14px; font-weight: 400; line-height: 1.55; margin: 0; }\n/* logo placeholder slot — drop a customer logo here */\n.rd-story__logo--ph {\n  display: inline-flex; align-items: center; justify-content: center;\n  height: 34px; min-width: 96px; padding: 0 14px;\n  border: 1px dashed var(--rd-dusk-06); border-radius: var(--rd-radius-sm);\n  font-family: var(--rd-font-mono); font-size: 11px; letter-spacing: 0.12em;\n  text-transform: uppercase; color: var(--rd-dusk-05); align-self: flex-start;\n}\n.rd-story__arrow {\n  margin-top: auto; align-self: flex-end;\n  width: 22px; height: 22px; background: var(--rd-hyper-05);\n  -webkit-mask: url(\"../assets/icons/arrow.svg\") center / contain no-repeat;\n  mask: url(\"../assets/icons/arrow.svg\") center / contain no-repeat;\n  transition: transform var(--rd-dur-fast) var(--rd-ease-out);\n}\n.rd-story:hover .rd-story__arrow { transform: translateX(3px); }\n\n/* card icon spot — plain white line-icon (64px Redis icon), no fill box */\n.rd-card__icon {\n  width: 48px; height: 48px;\n  display: block;\n  margin-bottom: var(--rd-space-2);\n}\n.rd-card__icon img { width: 100%; height: 100%; display: block; }\n\n/* BLOG-style eyebrow with a lime status dot */\n.rd-card__eyebrow--dot { display: inline-flex; align-items: center; gap: 8px; }\n.rd-card__eyebrow--dot::before {\n  content: \"\"; width: 8px; height: 8px; border-radius: 999px;\n  background: var(--rd-yellow-05);\n}\n\n/* ---------- Code block component ---------- */\n.rd-code {\n  display: block;\n  background: var(--rd-midnight-base);\n  color: var(--rd-white);\n  border-radius: var(--rd-radius-md);\n  padding: var(--rd-space-5) var(--rd-space-6);\n  font-family: var(--rd-font-mono);\n  font-size: 14px;\n  line-height: 1.6;\n  white-space: pre;\n  overflow-x: auto;\n}\n.rd-code .tok-kw  { color: var(--rd-purple-04); }\n.rd-code .tok-str { color: var(--rd-yellow-05); }\n.rd-code .tok-num { color: var(--rd-blue-03); }\n.rd-code .tok-com { color: var(--rd-dusk-05); font-style: italic; }\n.rd-code .tok-fn  { color: var(--rd-hyper-04); }\n.rd-code .tok-var { color: var(--rd-blue-03); }\n\n/* ---------- CTA bar (interrupter) ---------- */\n.rd-cta {\n  background: var(--rd-midnight-base);\n  color: var(--rd-white);\n  border-radius: var(--rd-radius-xl);\n  padding: var(--rd-space-12) var(--rd-space-12);\n  display: flex;\n  flex-wrap: wrap;\n  align-items: center;\n  justify-content: space-between;\n  gap: var(--rd-space-8);\n  width: 100%;\n}\n.rd-cta__title {\n  font-family: var(--rd-font-sans);\n  font-weight: 500;\n  font-size: 36px;\n  line-height: 1.1;\n  letter-spacing: -0.01em;\n  margin: 0;\n  max-width: 18ch;\n}\n.rd-cta__actions { display: flex; gap: var(--rd-space-3); flex-wrap: wrap; }\n\n/* ---------- Navbar (preview) ---------- */\n.rd-navbar {\n  display: flex;\n  align-items: center;\n  gap: var(--rd-space-8);\n  padding: var(--rd-space-3) var(--rd-space-6);\n  background: var(--rd-midnight-base);\n  color: var(--rd-white);\n  border-radius: var(--rd-radius-md);\n}\n.rd-navbar__logo img { height: 18px; filter: invert(1); }\n.rd-navbar__links {\n  display: flex;\n  gap: var(--rd-space-5);\n  font-size: 14px;\n  color: var(--rd-dusk-04);\n}\n.rd-navbar__links a:hover { color: var(--rd-white); }\n.rd-navbar__spacer { flex: 1; }\n.rd-navbar__cta {\n  background: var(--rd-hyper-10);\n  color: var(--rd-white);\n  border: 1px solid var(--rd-hyper-05);\n  padding: 8px 16px;\n  border-radius: var(--rd-radius-md);\n  font-size: 14px;\n  font-weight: 500;\n}\n.rd-navbar__cta:hover { background: var(--rd-hyper-05); }\n\n/* ---------- Modal ---------- */\n.rd-modal {\n  max-width: 460px;\n  background: var(--bg);\n  border: 1px solid var(--border);\n  border-radius: var(--rd-radius-lg);\n  box-shadow: 0 24px 48px rgba(9,26,35,0.25);\n  padding: var(--rd-space-8);\n}\n.rd-modal__title {\n  font-size: 22px;\n  font-weight: 500;\n  margin: 0 0 var(--rd-space-3);\n}\n.rd-modal__body {\n  color: var(--fg-muted);\n  font-size: 15px;\n  margin: 0 0 var(--rd-space-6);\n}\n.rd-modal__actions { display: flex; gap: var(--rd-space-3); justify-content: flex-end; }\n\n/* ---------- Toast ---------- */\n.rd-toast {\n  display: inline-flex;\n  align-items: center;\n  gap: var(--rd-space-2);\n  padding: var(--rd-space-3) var(--rd-space-4);\n  background: var(--rd-midnight-02);\n  color: var(--rd-white);\n  border: 1px solid var(--border);\n  border-radius: var(--rd-radius-md);\n  font-size: 14px;\n  max-width: 420px;\n}\n/* status shown by a small leading dot, not a side stripe */\n.rd-toast::before {\n  content: \"\"; flex: none;\n  width: 8px; height: 8px; border-radius: 999px;\n  background: var(--rd-dusk-05);\n}\n.rd-toast--success::before { background: var(--rd-yellow-05); }\n.rd-toast--error::before   { background: var(--rd-hyper-05); }\n.rd-toast--info::before    { background: var(--rd-blue-03); }\n\n/* ---------- Tooltip ---------- */\n.rd-tooltip {\n  position: relative;\n  display: inline-block;\n}\n.rd-tooltip__bubble {\n  display: inline-block;\n  background: var(--rd-midnight-base);\n  color: var(--rd-white);\n  padding: 6px 10px;\n  border-radius: var(--rd-radius-xs);\n  font-size: 12px;\n  font-family: var(--rd-font-sans);\n}\n\n/* ---------- Accordion ---------- */\n.rd-acc {\n  border-top: 1px solid var(--border);\n}\n.rd-acc__item { border-bottom: 1px solid var(--border); }\n.rd-acc__btn {\n  width: 100%;\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: var(--rd-space-4);\n  padding: var(--rd-space-5) 0;\n  background: none;\n  border: 0;\n  text-align: left;\n  font-family: inherit;\n  font-size: 18px;\n  font-weight: 500;\n  color: var(--fg);\n  cursor: pointer;\n}\n.rd-acc__btn::after {\n  content: \"+\";\n  font-family: var(--rd-font-mono);\n  font-weight: 400;\n  font-size: 24px;\n  color: var(--rd-hyper-05);\n  transition: transform var(--rd-dur-base) var(--rd-ease-out);\n}\n.rd-acc__item[aria-expanded=\"true\"] .rd-acc__btn::after {\n  content: \"−\";\n}\n.rd-acc__panel {\n  padding: 0 0 var(--rd-space-5);\n  color: var(--fg);\n  font-size: 14px;\n  font-weight: 400;\n  line-height: 1.55;\n  max-width: 720px;\n}\n\n/* ---------- Pagination ---------- */\n.rd-pagination {\n  display: inline-flex;\n  align-items: center;\n  gap: 4px;\n  font-family: var(--rd-font-sans);\n  font-size: 16px;\n}\n.rd-pagination button {\n  width: 40px; height: 40px;\n  border-radius: var(--rd-radius-md);\n  border: 0;\n  background: transparent;\n  color: var(--fg);\n  cursor: pointer;\n  font-family: inherit;\n  font-size: inherit;\n  transition: background var(--rd-dur-fast), color var(--rd-dur-fast);\n}\n.rd-pagination button:hover { background: var(--rd-dusk-03); }\n.theme-dark .rd-pagination button:hover { background: var(--rd-dusk-07); }\n.rd-pagination button[aria-current=\"page\"] {\n  background: var(--rd-hyper-05);\n  color: var(--rd-white);\n}\n.rd-pagination button[aria-current=\"page\"]:hover { background: var(--rd-hyper-06); }\n\n/* ---------- Toggle (segmented) ---------- */\n.rd-toggle {\n  display: inline-flex;\n  align-items: stretch;\n  background: var(--rd-dusk-07);\n  border-radius: var(--rd-radius-lg);\n  padding: 6px;\n  gap: 4px;\n}\n.theme-dark .rd-toggle { background: var(--rd-dusk-08); }\n.rd-toggle__opt {\n  appearance: none;\n  background: transparent;\n  border: 1px solid transparent;\n  border-radius: var(--rd-radius-md);\n  color: var(--rd-dusk-05);\n  font-family: var(--rd-font-sans);\n  font-size: 18px;\n  font-weight: 500;\n  padding: 14px 36px;\n  cursor: pointer;\n  transition: background var(--rd-dur-fast), color var(--rd-dur-fast), border-color var(--rd-dur-fast);\n}\n.rd-toggle__opt:hover { color: var(--rd-white); }\n.rd-toggle__opt[aria-pressed=\"true\"] {\n  background: var(--rd-hyper-10);\n  color: var(--rd-white);\n  border-color: var(--rd-hyper-05);\n}\n\n/* ---------- Copy code button (icon square) ---------- */\n.rd-copy {\n  width: 32px; height: 32px;\n  border-radius: var(--rd-radius-sm);\n  background: transparent;\n  border: 1px solid var(--border);\n  color: var(--fg-muted);\n  display: grid;\n  place-content: center;\n  cursor: pointer;\n  transition: background var(--rd-dur-fast), color var(--rd-dur-fast), border-color var(--rd-dur-fast);\n}\n.rd-copy:hover {\n  background: var(--rd-dusk-07);\n  color: var(--rd-white);\n  border-color: var(--rd-dusk-07);\n}\n.rd-copy[data-state=\"copied\"] {\n  background: var(--rd-dusk-03);\n  color: var(--rd-midnight-base);\n  border-color: var(--rd-dusk-03);\n}\n\n/* ---------- Ad / marketing buttons ----------\n   Solid contrast buttons used on full-bleed colored panels in ads + decks.\n   Color combos are intentional; do not remix. */\n.rd-ad-btn {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  font-family: var(--rd-font-sans);\n  font-weight: 500;\n  font-size: 18px;\n  line-height: 1;\n  padding: 18px 36px;\n  border-radius: var(--rd-radius-md);\n  border: 0;\n  cursor: pointer;\n  white-space: nowrap;\n  text-decoration: none;\n}\n.rd-ad-btn--on-hyper   { background: var(--rd-yellow-05);   color: var(--rd-midnight-base); }\n.rd-ad-btn--on-yellow  { background: var(--rd-midnight-base); color: var(--rd-white); }\n.rd-ad-btn--on-light   { background: var(--rd-midnight-base); color: var(--rd-white); }\n.rd-ad-btn--on-dark    { background: var(--rd-hyper-05);     color: var(--rd-white); }\n\n/* ---------- Table ---------- */\n.rd-table {\n  width: 100%;\n  border-collapse: collapse;\n  font-size: 14px;\n  font-family: var(--rd-font-sans);\n}\n.rd-table th, .rd-table td {\n  text-align: left;\n  padding: 12px 16px;\n  border-bottom: 1px solid var(--border);\n}\n.rd-table th {\n  font-family: var(--rd-font-mono);\n  font-size: 11px;\n  letter-spacing: 0.06em;\n  text-transform: uppercase;\n  color: var(--fg-subtle);\n  font-weight: 400;\n  background: var(--bg-elev);\n}\n.rd-table tr:hover td { background: var(--bg-elev); }\n\n/* ---------- Banner / Announcement ---------- */\n.rd-announce {\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  gap: var(--rd-space-3);\n  padding: 10px var(--rd-space-5);\n  background: var(--rd-yellow-05);\n  color: var(--rd-midnight-base);\n  font-size: 13px;\n  font-weight: 500;\n}\n.rd-announce a { text-decoration: underline; }\n\n<\u002Fstyle>\n  <script src=\"6baeaae0-2097-4f78-80d4-c467477b3d4f\"><\u002Fscript>\n  \n  \n  \n  <style>\n    * { box-sizing: border-box; }\n    html, body { margin: 0; height: 100%; }\n    a { color: #D1281E; }\n    a:hover { color: #FF4438; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"width:100vw;height:100vh;position:relative;overflow:hidden;background:#FFFFFF;\">\n\n  \n\n  <div style=\"position:absolute;inset:0;display:{{ rp1Display }};\">\n    <dc-import name=\"Roleplay 1 - Site\" on-nav=\"{{ goTo }}\" hint-size=\"100%,100%\"><\u002Fdc-import>\n  <\u002Fdiv>\n  <div style=\"position:absolute;inset:0;display:{{ rp2Display }};\">\n    <dc-import name=\"Roleplay 2 - Site\" on-nav=\"{{ goTo }}\" hint-size=\"100%,100%\"><\u002Fdc-import>\n  <\u002Fdiv>\n  <div style=\"position:absolute;inset:0;display:{{ rp3Display }};\">\n    <dc-import name=\"Roleplay 3 - Site\" on-nav=\"{{ goTo }}\" hint-size=\"100%,100%\"><\u002Fdc-import>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { rp: 1 };\n  renderVals() {\n    return {\n      rp1Display: this.state.rp === 1 ? 'block' : 'none',\n      rp2Display: this.state.rp === 2 ? 'block' : 'none',\n      rp3Display: this.state.rp === 3 ? 'block' : 'none',\n      goTo: (n) => this.setState({ rp: n }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
